
<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Runner</title>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4043765559226642" crossorigin="anonymous"></script>
<style>body{margin:0;background:#1a1a22;color:#fff;font-family:sans-serif;text-align:center}canvas{display:block;margin:10px auto;border:2px solid #7c3aed;background:#87ceeb}#ads{margin:10px auto;width:320px}#gameOver{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.9);display:none;align-items:center;justify-content:center;flex-direction:column;z-index:999}button{padding:12px 24px;background:#7c3aed;color:#fff;border:none;border-radius:8px;margin:10px}</style>
</head><body>
<h3>🏃 Runner - Score: <span id="score">0</span></h3>
<div id="ads"><ins class="adsbygoogle" style="display:inline-block;width:320px;height:50px" data-ad-client="ca-pub-4043765559226642" data-ad-slot="3854424641"></ins><script>(adsbygoogle = window.adsbygoogle || []).push({});</script></div>
<canvas id="c" width="320" height="200"></canvas>
<div id="gameOver"><h2>Game Over</h2><p>Score: <span id="final">0</span></p><ins class="adsbygoogle" style="display:block;width:300px;height:250px" data-ad-client="ca-pub-4043765559226642" data-ad-slot="3854424641"></ins><script>(adsbygoogle = window.adsbygoogle || []).push({});</script><button onclick="location.reload()">Jogar Novamente</button><button onclick="window.location='../../'">Menu</button></div>
<script>
const c=document.getElementById('c'),x=c.getContext('2d');let p={x:50,y:150,v:0,j:false},o=[],s=0,f=0,g=false;
function draw(){if(g)return;x.fillStyle='#87ceeb';x.fillRect(0,0,320,200);x.fillStyle='#8b4513';x.fillRect(0,170,320,30);o.forEach(b=>{x.fillStyle='#dc2626';x.fillRect(b.x,150,20,20)});x.fillStyle='#3b82f6';x.fillRect(p.x,p.y,20,20);document.getElementById('score').textContent=s;if(!g)requestAnimationFrame(draw)}
function update(){if(g)return;f++;if(p.j){p.v+=.8;p.y+=p.v;if(p.y>=150){p.y=150;p.j=false;p.v=0}}if(f%60===0)o.push({x:320});o=o.filter(b=>b.x>-30);o.forEach(b=>{b.x-=4;if(p.x<b.x+20&&p.x+20>b.x&&p.y<b.y+20&&p.y+20>b.y)end()});s++;if(!g)setTimeout(update,20)}
function jump(){if(!p.j){p.j=true;p.v=-12}}function end(){g=true;document.getElementById('final').textContent=s;document.getElementById('gameOver').style.display='flex'}
c.onclick=jump;document.onkeydown=e=>{if(e.code==='Space')jump()};draw();update();
</script></body></html>
